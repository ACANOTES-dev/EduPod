<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — School OS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #FEFDFB;
      color: #1C1917;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      max-width: 480px;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      border-radius: 50%;
      background-color: #D1FAE5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .ar {
      font-size: 1.25rem;
      font-weight: 600;
      color: #57534E;
      direction: rtl;
      margin-bottom: 1rem;
    }
    p {
      color: #78716C;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }
    .ar-desc {
      direction: rtl;
      color: #78716C;
      font-size: 0.9rem;
      line-height: 1.6;
    }
    .retry {
      margin-top: 2rem;
    }
    .retry button {
      background-color: #047857;
      color: white;
      border: none;
      padding: 0.625rem 1.5rem;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 500;
    }
    .retry button:hover {
      background-color: #065F46;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#128268;</div>
    <h1>You are offline</h1>
    <div class="ar">أنت غير متصل بالإنترنت</div>
    <p>Cached data shown below may be stale. Reconnect to see the latest information.</p>
    <p class="ar-desc">قد تكون البيانات المخزنة مؤقتاً قديمة. أعد الاتصال لرؤية أحدث المعلومات.</p>
    <div class="retry">
      <button onclick="window.location.reload()">Retry / إعادة المحاولة</button>
    </div>
  </div>
</body>
</html>
