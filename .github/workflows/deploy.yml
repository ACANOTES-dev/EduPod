name: Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check migration safety
        run: |
          BASE_SHA="${{ github.event.before }}"

          if [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            mapfile -t changed_files < <(find packages/prisma/migrations -type f \( -name 'migration.sql' -o -name 'post_migrate.sql' \))
          else
            mapfile -t changed_files < <(git diff --name-only "$BASE_SHA" "${{ github.sha }}" -- packages/prisma/migrations | grep -E '(migration\.sql|post_migrate\.sql)$' || true)
          fi

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "No migration SQL changes detected in this deploy."
            exit 0
          fi

          node scripts/check-migration-safety.mjs "${changed_files[@]}"

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 10m
          script: |
            set -e

            echo "=== Waiting for deploy lock ==="
            exec 9>/tmp/edupod-deploy.lock
            flock 9

            cd /opt/edupod/app

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Installing dependencies ==="
            pnpm install --frozen-lockfile || pnpm install

            echo "=== Cleaning stale build caches ==="
            rm -f packages/shared/tsconfig.tsbuildinfo
            rm -rf apps/api/dist
            rm -rf apps/worker/dist
            if [ -d apps/web/.next ]; then
              stale_next_dir="apps/web/.next.stale.$(date +%s)"
              mv apps/web/.next "$stale_next_dir" || true
              rm -rf "$stale_next_dir" || true
            fi

            echo "=== Regenerating Prisma client ==="
            cd packages/prisma
            npx --no-install prisma generate
            cd /opt/edupod/app

            echo "=== Building all packages ==="
            # NEXT_PUBLIC_API_URL must be empty so client-side API calls use relative
            # paths (via Next.js rewrites). This ensures requests go to the current
            # tenant subdomain, not a hardcoded domain that fails tenant resolution.
            NEXT_PUBLIC_API_URL= pnpm build --force

            echo "=== Running database migrations ==="
            set -a && source .env && set +a
            cd packages/prisma
            DATABASE_URL="$DATABASE_MIGRATE_URL" npx prisma migrate deploy
            cd /opt/edupod/app

            echo "=== Applying post-migration scripts (RLS, triggers) ==="
            for f in packages/prisma/migrations/*/post_migrate.sql; do
              if [ -f "$f" ]; then
                docker exec -i $(docker ps -q --filter ancestor=postgres:16) \
                  psql -U edupod_admin -d school_platformedupod_prod < "$f" 2>&1
              fi
            done

            echo "=== Restarting services ==="
            # Services run under edupod user's pm2, not root's
            sudo -u edupod PM2_HOME=/home/edupod/.pm2 pm2 restart api web worker
            sudo -u edupod PM2_HOME=/home/edupod/.pm2 pm2 save
            echo "pm2 process list after restart:"
            sudo -u edupod PM2_HOME=/home/edupod/.pm2 pm2 list

            echo "=== Smoke test ==="
            sleep 5
            web_ok=0
            api_ok=0

            if curl -sf http://localhost:5551/en/login > /dev/null; then
              echo "WEB OK"
              web_ok=1
            else
              echo "WEB FAILED"
              echo "=== web describe ==="
              sudo -u edupod PM2_HOME=/home/edupod/.pm2 pm2 describe web || true
              echo "=== web logs ==="
              sudo -u edupod PM2_HOME=/home/edupod/.pm2 pm2 logs web --lines 80 --nostream || true
              echo "=== localhost web headers ==="
              curl -I http://localhost:5551/en/login || true
            fi

            if curl -sf http://localhost:3001/api/health > /dev/null; then
              echo "API OK"
              api_ok=1
            else
              echo "API FAILED"
              echo "=== api describe ==="
              sudo -u edupod PM2_HOME=/home/edupod/.pm2 pm2 describe api || true
              echo "=== api logs ==="
              sudo -u edupod PM2_HOME=/home/edupod/.pm2 pm2 logs api --lines 80 --nostream || true
            fi

            if [ "$web_ok" -ne 1 ] || [ "$api_ok" -ne 1 ]; then
              exit 1
            fi

            echo "=== Deploy complete ==="
