name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high

      - name: Generate Prisma client
        run: pnpm --filter @school/prisma exec prisma generate

      - name: Lint
        run: pnpm -r run lint

      - name: Type check
        run: pnpm -r run type-check

      - name: Run unit tests
        run: pnpm turbo run test

      - name: Build
        run: pnpm build --force

      # ── RLS integration tests (S-21) ──────────────────────────────
      # Requires Docker PostgreSQL service container (DX-03).
      # Uncomment when DX-03 is implemented. See apps/api/test/rls-integration.md.
      #
      # - name: RLS integration tests (restricted DB role)
      #   run: pnpm --filter @school/api test:integration
