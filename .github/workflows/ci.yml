name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

# Shared across all jobs. Turbo Remote Cache is self-hosted on turbo.edupod.app;
# see /opt/turbo-cache on the Hetzner server. TURBO_TOKEN is a GitHub Actions secret.
env:
  TURBO_API: https://turbo.edupod.app
  TURBO_TEAM: edupod
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  changes:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: changes-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'apps/api/**'
              - 'apps/worker/**'
              - 'packages/prisma/**'
              - 'packages/shared/**'
              - 'scripts/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'
            frontend:
              - 'apps/web/**'
              - 'packages/ui/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'turbo.json'

  ci:
    if: github.event_name != 'schedule'
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: ci-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      SENTRY_ENVIRONMENT: ci
      SENTRY_RELEASE: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Cache node_modules
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit:security

      - name: Cache Prisma generated client
        id: prisma-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.pnpm/@prisma+client*/node_modules/.prisma
            node_modules/@prisma/client
          key: prisma-${{ runner.os }}-${{ hashFiles('packages/prisma/schema.prisma') }}

      - name: Generate Prisma client
        if: steps.prisma-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @school/prisma exec prisma generate

      - name: Verify worker processor specs
        run: pnpm check:worker-processor-specs

      - name: Check i18n completeness
        run: pnpm i18n:check

      - name: Check hotspot complexity budgets
        run: pnpm hotspots:check

      - name: RLS catalogue audit
        run: npx tsx scripts/audit-rls.ts

      - name: Raw SQL governance check
        run: node scripts/check-raw-sql-governance.js

      - name: Lint (errors only)
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: pnpm lint:ci

      - name: Type check
        run: pnpm turbo run type-check
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'

      - name: Module cohesion check
        run: node scripts/check-module-cohesion.js --max-errors 0

      - name: Module tier dependency check
        run: node scripts/check-module-tiers.js

      - name: Global provider registry check
        run: node scripts/check-global-providers.js

      - name: Module boundary check
        run: pnpm check:boundaries -- --max-violations 0

      - name: Cross-module dependency check
        run: node scripts/check-cross-module-deps.js --max-violations 0

  unit-tests:
    if: github.event_name != 'schedule'
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    concurrency:
      group: unit-tests-${{ github.workflow }}-${{ github.ref }}-shard-${{ matrix.shard }}
      cancel-in-progress: true
    env:
      SENTRY_ENVIRONMENT: ci
      SENTRY_RELEASE: ${{ github.sha }}
      JEST_SHARD_MODE: '1'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Cache node_modules
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Cache Prisma generated client
        id: prisma-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.pnpm/@prisma+client*/node_modules/.prisma
            node_modules/@prisma/client
          key: prisma-${{ runner.os }}-${{ hashFiles('packages/prisma/schema.prisma') }}

      - name: Generate Prisma client
        if: steps.prisma-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @school/prisma exec prisma generate

      - name: Run sharded tests — api + worker (shard ${{ matrix.shard }}/3)
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          pnpm --filter @school/api run test:coverage \
            --shard=${{ matrix.shard }}/3 \
            --coverageDirectory=coverage/shard-${{ matrix.shard }}
          pnpm --filter @school/worker run test:coverage \
            --shard=${{ matrix.shard }}/3 \
            --coverageDirectory=coverage/shard-${{ matrix.shard }}

      - name: Run non-sharded package tests (shard 1 only)
        if: matrix.shard == 1
        run: pnpm --filter @school/shared --filter @school/web --filter @school/prisma run test

      - name: Upload coverage shard
        uses: actions/upload-artifact@v4
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: |
            apps/api/coverage/shard-${{ matrix.shard }}/coverage-final.json
            apps/worker/coverage/shard-${{ matrix.shard }}/coverage-final.json
          retention-days: 1
          if-no-files-found: error

  unit-tests-merge:
    if: github.event_name != 'schedule'
    needs: [unit-tests]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Cache node_modules
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Download all coverage shards
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-shard-*
          path: coverage-shards/

      - name: Arrange shards for merge
        # actions/upload-artifact@v4 strips the common ancestor from paths, so
        # the artifact root is \`apps/\` and the files live at
        # \`<artifact>/api/coverage/shard-N/\` and \`<artifact>/worker/coverage/shard-N/\`
        # (NOT \`<artifact>/apps/api/...\`). Rearrange into the structure the
        # merge script expects.
        run: |
          mkdir -p coverage-shards-api coverage-shards-worker
          for shard in 1 2 3; do
            if [ -d "coverage-shards/coverage-shard-$shard/api/coverage/shard-$shard" ]; then
              cp -r "coverage-shards/coverage-shard-$shard/api/coverage/shard-$shard" "coverage-shards-api/shard-$shard"
            fi
            if [ -d "coverage-shards/coverage-shard-$shard/worker/coverage/shard-$shard" ]; then
              cp -r "coverage-shards/coverage-shard-$shard/worker/coverage/shard-$shard" "coverage-shards-worker/shard-$shard"
            fi
          done
          echo "=== api shards ==="
          ls -la coverage-shards-api/
          echo "=== worker shards ==="
          ls -la coverage-shards-worker/

      - name: Merge and check api coverage
        run: node scripts/merge-coverage-shards.js apps/api coverage-shards-api

      - name: Merge and check worker coverage
        run: node scripts/merge-coverage-shards.js apps/worker coverage-shards-worker

      - name: Test coverage gate (git-diff based)
        run: pnpm run check:test-gate

  build:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true'
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: build-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      SENTRY_ENVIRONMENT: ci
      SENTRY_RELEASE: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Cache node_modules
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Cache Prisma generated client
        id: prisma-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.pnpm/@prisma+client*/node_modules/.prisma
            node_modules/@prisma/client
          key: prisma-${{ runner.os }}-${{ hashFiles('packages/prisma/schema.prisma') }}

      - name: Generate Prisma client
        if: steps.prisma-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @school/prisma exec prisma generate

      - name: Build
        run: pnpm build

  backend-verification:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: backend-verification-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      SENTRY_ENVIRONMENT: ci
      SENTRY_RELEASE: ${{ github.sha }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: password
          POSTGRES_DB: edupod_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Cache node_modules
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Cache Prisma generated client
        id: prisma-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules/.pnpm/@prisma+client*/node_modules/.prisma
            node_modules/@prisma/client
          key: prisma-${{ runner.os }}-${{ hashFiles('packages/prisma/schema.prisma') }}

      - name: Generate Prisma client
        if: steps.prisma-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @school/prisma exec prisma generate

      - name: Setup test database
        run: |
          psql "postgresql://prisma:password@localhost:5432/edupod_test" -c "DO \$\$ BEGIN CREATE TYPE timerange AS RANGE (subtype = time); EXCEPTION WHEN duplicate_object THEN null; END \$\$;"
          pnpm --filter @school/prisma exec prisma db push --skip-generate --accept-data-loss
          # Apply canonical RLS policies (db push doesn't run migration.sql, so the
          # WITH CHECK + FORCE policies from packages/prisma/rls/policies.sql need
          # to be applied explicitly on top).
          psql "postgresql://prisma:password@localhost:5432/edupod_test" -f packages/prisma/rls/policies.sql
          pnpm db:post-migrate
          pnpm db:seed
        env:
          DATABASE_URL: postgresql://prisma:password@localhost:5432/edupod_test?schema=public
          REDIS_URL: redis://localhost:6379

      - name: Run backend integration and e2e tests
        run: pnpm --filter @school/api run test:integration
        env:
          API_PORT: '0'
          APP_URL: http://localhost:3000
          DATABASE_URL: postgresql://prisma:password@localhost:5432/edupod_test?schema=public
          ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          INTEGRATION_MAX_WORKERS: '2'
          JWT_REFRESH_SECRET: 1a5be597a11a3d357ec51c55b88bdd4fe6a138f9f816dd0e8f048d802f87b2b3
          JWT_SECRET: 73e10ad593c9fb3e3c0aaef14332e1f4f38dfe27bb579e35ef57e8303a767d48
          MFA_ISSUER: SchoolOS-Test
          NODE_ENV: test
          PLATFORM_DOMAIN: edupod.app
          REDIS_URL: redis://localhost:6379

  solver-py:
    # CP-SAT sidecar (Python) pytest + ruff + mypy + end-to-end integration
    # against the TS regression harness. Runs only when the sidecar or the
    # shared scheduler contract changes — it's ~2 min for the full harness
    # once the venv is primed, so gating on changed paths keeps the fast-PR
    # loop honest.
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.backend == 'true'
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: solver-py-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
          package-manager-cache: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/solver-py/pyproject.toml

      - name: Cache node_modules
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install TS dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Create solver-py venv + install
        working-directory: apps/solver-py
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -e ".[dev]"

      - name: Verify ortools pin
        working-directory: apps/solver-py
        run: .venv/bin/pip freeze | grep -i "^ortools==" | tee /tmp/ortools-pin
        # Stage 5 carryover §4: the pin matters. If this prints a version
        # other than 9.15.6755 without a Stage 9 retest-and-approval sign-off,
        # this job fails on purpose.

      - name: Assert ortools pin is 9.15.6755
        run: |
          grep -q '^ortools==9.15.6755' /tmp/ortools-pin || {
            echo "Unexpected ortools version — Stage 5 carryover §4 requires an explicit retest before changing the pin."
            cat /tmp/ortools-pin
            exit 1
          }

      - name: Lint (ruff)
        working-directory: apps/solver-py
        run: .venv/bin/ruff check src tests

      - name: Type check (mypy)
        working-directory: apps/solver-py
        run: .venv/bin/mypy src

      - name: Unit tests (pytest)
        working-directory: apps/solver-py
        run: .venv/bin/pytest -q

      - name: TS CP-SAT regression harness vs live sidecar
        # The test file spawns a fresh uvicorn per fixture (see
        # cp-sat-regression.test.ts) so one OR-Tools hang can't wedge
        # later fixtures. We pass the venv's uvicorn path via env so the
        # test doesn't have to guess a repo-relative path.
        env:
          CP_SAT_SIDECAR_PORT: '5557'
          CP_SAT_SIDECAR_UVICORN: ${{ github.workspace }}/apps/solver-py/.venv/bin/uvicorn
          CP_SAT_SIDECAR_CWD: ${{ github.workspace }}/apps/solver-py
        run: pnpm --filter @school/shared test -- --testPathPattern="cp-sat-regression" --testTimeout=900000

  visual:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || needs.changes.outputs.frontend == 'true'
    needs: [changes]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: visual-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    env:
      API_URL: http://localhost:5552
      APP_URL: http://localhost:5551
      NEXT_PUBLIC_API_URL: ''
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Cache node_modules
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @school/web exec playwright install --with-deps chromium

      - name: Run visual smoke tests
        run: pnpm test:visual

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report
          path: |
            apps/web/e2e/playwright-report
            apps/web/e2e/test-results
          if-no-files-found: ignore

  secrets-scan:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Secret scanning
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  restore-drill:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      API_PORT: '0'
      APP_URL: http://localhost:5551
      DATABASE_URL: postgresql://postgres:localpassword@localhost:5553/school_platform
      ENCRYPTION_KEY: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      JWT_REFRESH_SECRET: 1a5be597a11a3d357ec51c55b88bdd4fe6a138f9f816dd0e8f048d802f87b2b3
      JWT_SECRET: 73e10ad593c9fb3e3c0aaef14332e1f4f38dfe27bb579e35ef57e8303a767d48
      MFA_ISSUER: SchoolOS-Test
      NODE_ENV: test
      PLATFORM_DOMAIN: edupod.app
      REDIS_URL: redis://localhost:5554
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: school_platform
          POSTGRES_PASSWORD: localpassword
          POSTGRES_USER: postgres
        ports:
          - 5553:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d school_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 5554:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Cache node_modules
        id: deps-cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-node24-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        if: steps.deps-cache.outputs.cache-hit != 'true'
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @school/prisma exec prisma generate

      - name: Build shared packages
        run: pnpm --filter @school/shared --filter @school/prisma run build

      - name: Apply Prisma migrations
        run: pnpm --filter @school/prisma exec prisma migrate deploy

      - name: Apply post-migrate SQL
        run: pnpm db:post-migrate

      - name: Seed base data
        run: pnpm db:seed

      - name: Restore drill verification
        run: bash scripts/ci-restore-drill.sh

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [ci, unit-tests-merge, build, backend-verification]
    runs-on: ubuntu-latest
    env:
      SENTRY_ENVIRONMENT: production
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        env:
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          envs: DEPLOY_SHA
          script: |
            cd /opt/edupod/app
            DEPLOY_SHA="$DEPLOY_SHA" SENTRY_ENVIRONMENT="$SENTRY_ENVIRONMENT" bash scripts/deploy-production.sh
