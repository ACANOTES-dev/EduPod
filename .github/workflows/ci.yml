name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'pnpm'
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @school/prisma exec prisma generate

      - name: Check i18n completeness
        run: pnpm i18n:check

      - name: Check hotspot complexity budgets
        run: pnpm hotspots:check

      - name: Lint
        run: pnpm -r run lint

      - name: Type check
        run: pnpm -r run type-check

      - name: Run unit tests
        run: pnpm turbo run test

      - name: Build
        run: pnpm build --force
