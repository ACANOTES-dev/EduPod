name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: type-check
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: localpassword
          POSTGRES_DB: school_platform
        ports:
          - 5553:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 5554:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:localpassword@localhost:5553/school_platform
      REDIS_URL: redis://localhost:5554
      JWT_SECRET: ci-test-secret-that-is-at-least-32-chars-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-chars
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  rls-leakage:
    name: RLS Leakage Tests
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: localpassword
          POSTGRES_DB: school_platform
        ports:
          - 5553:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 5554:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:localpassword@localhost:5553/school_platform
      REDIS_URL: redis://localhost:5554
      JWT_SECRET: ci-test-secret-that-is-at-least-32-chars-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-chars
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run RLS leakage tests
        run: pnpm --filter @school/api exec jest --config ./test/jest-e2e.json --testPathPattern="rls|p[0-9].*rls" --forceExit --detectOpenHandles
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: rls-leakage-report
          path: apps/api/test/
          retention-days: 7

  critical-workflows:
    name: Critical Workflow Tests
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: localpassword
          POSTGRES_DB: school_platform
        ports:
          - 5553:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 5554:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:localpassword@localhost:5553/school_platform
      REDIS_URL: redis://localhost:5554
      JWT_SECRET: ci-test-secret-that-is-at-least-32-chars-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-chars
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run critical workflow tests
        run: pnpm --filter @school/api exec jest --config ./test/jest-e2e.json --testPathPattern="workflows/" --forceExit --detectOpenHandles
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: workflow-test-report
          path: apps/api/test/workflows/
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  pdf-snapshots:
    name: PDF Snapshot Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run PDF snapshot tests
        run: pnpm --filter @school/api exec jest --testPathPattern="pdf-snapshots" --forceExit
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: pdf-snapshot-report
          path: apps/api/test/__snapshots__/
          retention-days: 7

  playwright-visual:
    name: Visual Regression
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @school/web exec playwright install --with-deps chromium
      - run: pnpm --filter @school/web build
      - name: Run visual regression tests
        run: pnpm --filter @school/web exec playwright test
        env:
          NODE_ENV: test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/e2e/test-results/
          retention-days: 7
